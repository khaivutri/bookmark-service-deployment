version: "3.7"

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  bookmark-service:
    image: khaivutri/shorten_link:test
    build: .
    container_name: bookmark-service
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_ADDRESS=redis:6379
