version: "3.7"

services:
  redis:
    image: redis:alpine
    container_name: redis

  bookmark_service:
    image: khaivutri/shorten_link:deploy
    build: ../bookmark-service
    container_name: bookmark_service
    depends_on:
      - redis
    env_file:
      - ./bookmark_service/.env

  bookmark_service2:
    image: khaivutri/shorten_link:deploy
    build: ../bookmark-service
    container_name: bookmark_service2
    depends_on:
      - redis
    env_file:
      - ./bookmark_service/.env

  bookmark_service3:
    image: khaivutri/shorten_link:deploy
    build: ../bookmark-service
    container_name: bookmark_service3
    depends_on:
      - redis
    env_file:
      - ./bookmark_service/.env

  portal:
    image: ebvn/bookmark-app-portal:mono
    container_name: portal

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - bookmark_service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:Z
